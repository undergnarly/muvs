<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Muvs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <script>
    if (!/^\/(?:admin|login|projects)(?:\/|$)/.test(location.pathname)) {
      ['/images/menu/music2.webp', '/images/menu/mixes-trans.webp', '/images/menu/code2.webp'].forEach(function (href) {
        var link = document.createElement('link');
        link.rel = 'preload';
        link.as = 'image';
        link.href = href;
        link.fetchPriority = 'high';
        document.head.appendChild(link);
      });
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
</head>

<body>
  <div id="splash-screen" style="position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:linear-gradient(to bottom,#767676,#8f8f8fc2 35%,#ffffff);transition:opacity .6s ease">
    <style>#splash-screen.hidden{opacity:0;pointer-events:none}</style>
    <div style="text-align:center;font-family:Urbanist,sans-serif">
      <div style="width:140px;height:70px;margin:0 auto;background-color:#fff;-webkit-mask:url('/images/logo.png') center/contain no-repeat;mask:url('/images/logo.png') center/contain no-repeat"></div>
      <div style="margin-top:22px;width:180px;height:2px;background:rgba(255,255,255,0.35);border-radius:1px;overflow:hidden">
        <div id="splash-bar" style="width:0%;height:100%;background:#ffffff;border-radius:1px;transition:width .3s ease"></div>
      </div>
      <div id="splash-status" style="margin-top:10px;font-size:11px;font-weight:500;letter-spacing:.18em;color:rgba(255,255,255,0.85)">LOADING</div>
    </div>
  </div>
  <script>
    (function(){
      var bar=document.getElementById('splash-bar');
      var status=document.getElementById('splash-status');
      var progress=0;
      var steps=[
        [10,'SCRIPTS'],
        [30,'FONTS'],
        [55,'ASSETS'],
        [75,'TEXTURES'],
        [90,'RENDER'],
        [100,'READY']
      ];
      var i=0;
      function tick(){
        if(i>=steps.length)return;
        var s=steps[i];
        bar.style.width=s[0]+'%';
        status.textContent=s[1];
        i++;
        setTimeout(tick,300+Math.random()*400);
      }
      setTimeout(tick,100);
    })();
  </script>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
